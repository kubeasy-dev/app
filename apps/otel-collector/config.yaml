extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:3000"
            - "http://localhost:3024"
            - "https://kubeasy.dev"
            - "https://*.kubeasy.dev"
          allowed_headers:
            - "*"

processors:
  batch:
  
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  resourcedetection:
    detectors: [env, system]
    timeout: 2s
    override: false

  transform/correlation:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(attributes["loki.resource.labels"], "service.name, deployment.environment")

  filter/noisy_requests:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.method"] == "HEAD"'
        - 'attributes["http.request.method"] == "HEAD"'
        - 'IsMatch(attributes["http.target"], ".*\\.(js|css|png|svg|ico|woff2|jpg|jpeg|map)$")'
        - 'IsMatch(attributes["url.path"], ".*\\.(js|css|png|svg|ico|woff2|jpg|jpeg|map)$")'

  transform/postgres:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - replace_pattern(attributes["db.statement"], "\\d+", "?") where attributes["db.system"] == "postgresql"
          - replace_pattern(attributes["db.statement"], "'[^']*'", "?") where attributes["db.system"] == "postgresql"

  resource/env_override:
    attributes:
      - key: deployment.environment.name
        value: production
        action: upsert

  filter/healthcheck:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/healthz"'
        - 'attributes["http.target"] == "/api/healthz"'

exporters:
  debug:
    verbosity: basic
  otlphttp:
    endpoint: ${env:OTLP_ENDPOINT}

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource/env_override, filter/healthcheck, filter/noisy_requests, transform/postgres, batch]
      exporters: [otlphttp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource/env_override, transform/correlation, batch]
      exporters: [otlphttp]
